<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0A0A0F"/>
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Background glow -->
  <ellipse cx="300" cy="315" rx="400" ry="400" fill="#F97316" fill-opacity="0.08"/>
  <ellipse cx="900" cy="315" rx="350" ry="350" fill="#1E3A5F" fill-opacity="0.15"/>

  <!-- Logo area -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="#F97316"/>
  <text x="108" y="120" font-family="Arial Black, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle">F</text>

  <!-- Brand name -->
  <text x="152" y="120" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="white">FormaEG</text>

  <!-- Headline -->
  <text x="80" y="280" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="white">Shape Your</text>
  <text x="80" y="368" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#F97316">Future.</text>

  <!-- Subheading -->
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="28" fill="#94A3B8">Egypt&apos;s complete fitness platform — built for Egyptians.</text>

  <!-- Pills -->
  <rect x="80" y="490" width="220" height="48" rx="24" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1"/>
  <text x="190" y="520" font-family="Arial, sans-serif" font-size="18" fill="#F97316" text-anchor="middle">AI Coaching</text>

  <rect x="316" y="490" width="220" height="48" rx="24" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1"/>
  <text x="426" y="520" font-family="Arial, sans-serif" font-size="18" fill="#F97316" text-anchor="middle">Workouts</text>

  <rect x="552" y="490" width="220" height="48" rx="24" fill="#F97316" fill-opacity="0.15" stroke="#F97316" stroke-width="1"/>
  <text x="662" y="520" font-family="Arial, sans-serif" font-size="18" fill="#F97316" text-anchor="middle">Nutrition</text>

  <!-- Right side deco -->
  <circle cx="1050" cy="315" r="180" stroke="#F97316" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
  <circle cx="1050" cy="315" r="120" stroke="#F97316" stroke-width="1" stroke-opacity="0.2" fill="none"/>
  <text x="1050" y="340" font-family="Arial Black, sans-serif" font-size="96" font-weight="900" fill="#F97316" fill-opacity="0.15" text-anchor="middle">F</text>

  <!-- Domain -->
  <text x="1120" y="590" font-family="Arial, sans-serif" font-size="20" fill="#475569" text-anchor="end">formaeg.com</text>

  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
  </defs>
</svg>
